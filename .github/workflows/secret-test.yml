name: Test GitHub Secrets

on:
  push:
    branches:
      - main

jobs:
  print-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Echo masked secret
        run: |
          echo "::add-mask::${{ secrets.MY_SECRET_KEY }}"
          echo "MY_SECRET_KEY is: ${{ secrets.MY_SECRET_KEY }}"
          echo "::add-mask::${{ secrets.ANOTHER_SECRET }}"
          echo "ANOTHER_SECRET is: ${{ secrets.ANOTHER_SECRET }}"
